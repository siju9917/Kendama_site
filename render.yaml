# Render Blueprint — one-click deploy of AppraiseOS.
# Docs: https://render.com/docs/blueprint-spec
#
# This version is tuned for Render's FREE plan — no persistent disk, no
# custom mount paths. Data (SQLite DB + photos) lives inside the deploy's
# ephemeral filesystem and is wiped on every redeploy or restart.
#
# To make data persistent, upgrade to a paid plan and uncomment the `disk:`
# block at the bottom, then redeploy.

services:
  - type: web
    name: appraise-os
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Render auto-generates a stable secret on first deploy and keeps it
      # across redeploys so user sessions survive.
      - key: APPRAISE_SESSION_SECRET
        generateValue: true

    # Persistent disk — FREE PLAN DOES NOT SUPPORT THIS.
    # Uncomment the block below AFTER upgrading the service to Starter
    # ($7/month) or higher, and add these env vars:
    #   APPRAISE_DB_PATH=/var/data/app.db
    #   APPRAISE_UPLOAD_DIR=/var/data/uploads
    #
    # disk:
    #   name: appraise-data
    #   mountPath: /var/data
    #   sizeGB: 1
