# Render Blueprint — one-click deploy of AppraiseOS.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: appraise-os
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APPRAISE_SESSION_SECRET
        generateValue: true    # Render auto-generates a stable secret
      - key: APPRAISE_DB_PATH
        value: /var/data/app.db
      - key: APPRAISE_UPLOAD_DIR
        value: /var/data/uploads
    # The `disk` block is *required* for real appraisal data to persist
    # across deploys and restarts. Render's free tier does NOT include a
    # persistent disk — attaching one is $1/month for 1 GB, which is the
    # cheapest credible option for a live user.
    #
    # If you want to try the app for free on Render's ephemeral filesystem,
    # comment out the `disk` block below. Data (db + photos) will then
    # reset on every deploy and possibly on restarts — fine for a demo, not
    # fine for a real appraiser's workflow.
    #disk:
      #name: appraise-data
      #mountPath: /var/data
      #sizeGB: 1
